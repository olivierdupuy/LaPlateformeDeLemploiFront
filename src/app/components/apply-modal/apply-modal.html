<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal-content">
    <div class="modal-top">
      <div>
        <h2>Postuler a cette offre</h2>
        <p>{{ jobTitle }}</p>
      </div>
      <button class="close-btn" (click)="close.emit()"><i class="bi bi-x-lg"></i></button>
    </div>

    <!-- Info candidat (pre-rempli depuis le profil) -->
    <div class="applicant-info">
      <div class="ai-avatar"><i class="bi bi-person-fill"></i></div>
      <div>
        <strong>{{ userName }}</strong>
        <span>{{ userEmail }}</span>
      </div>
    </div>

    <form (ngSubmit)="submit()" class="modal-form">
      <div class="form-group">
        <label>Telephone</label>
        <input type="tel" placeholder="06 12 34 56 78" [(ngModel)]="form.phone" name="phone" />
      </div>
      <div class="form-group">
        <label>Lettre de motivation</label>
        <textarea placeholder="Expliquez pourquoi ce poste vous interesse, ce que vous pouvez apporter a l'equipe..." [(ngModel)]="form.coverLetter" name="coverLetter" rows="5"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" (click)="close.emit()">Annuler</button>
        <button type="submit" class="btn-primary" [disabled]="submitting">
          @if (submitting) { <span class="sp"></span> Envoi... } @else { <i class="bi bi-send-fill"></i> Envoyer ma candidature }
        </button>
      </div>
    </form>
  </div>
</div>
