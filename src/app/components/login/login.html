<section class="auth-page">
  <div class="auth-card animate-in">
    <div class="auth-header">
      <div class="auth-icon"><i class="bi bi-person-circle"></i></div>
      <h1>Connexion</h1>
      <p>Accedez a votre espace personnel</p>
    </div>

    <form (ngSubmit)="submit()" class="auth-form">
      <div class="form-group">
        <label>Adresse email</label>
        <div class="input-icon">
          <i class="bi bi-envelope"></i>
          <input type="email" placeholder="vous&#64;exemple.fr" [(ngModel)]="form.email" name="email" required />
        </div>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-icon">
          <i class="bi bi-lock"></i>
          <input [type]="showPassword ? 'text' : 'password'" placeholder="Votre mot de passe" [(ngModel)]="form.password" name="password" required />
          <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
            <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary full-w" [disabled]="loading">
        @if (loading) { <span class="sp"></span> Connexion... } @else { <i class="bi bi-box-arrow-in-right"></i> Se connecter }
      </button>
    </form>

    <div class="auth-footer">
      <span>Pas encore de compte ?</span>
      <a routerLink="/register">Creer un compte</a>
    </div>
  </div>
</section>
