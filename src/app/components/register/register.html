<section class="auth-page">
  <div class="auth-card animate-in">
    <div class="auth-header">
      <div class="auth-icon"><i class="bi bi-person-plus"></i></div>
      <h1>Creer un compte</h1>
      <p>Rejoignez La Plateforme de l'Emploi</p>
    </div>

    <form (ngSubmit)="submit()" class="auth-form">
      <div class="form-group">
        <label>Vous etes</label>
        <div class="role-selector">
          <button type="button" class="role-btn" [class.selected]="form.role === 'Candidate'" (click)="setRole('Candidate')">
            <i class="bi bi-person"></i> Candidat
          </button>
          <button type="button" class="role-btn" [class.selected]="form.role === 'Recruiter'" (click)="setRole('Recruiter')">
            <i class="bi bi-building"></i> Recruteur
          </button>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Prenom *</label>
          <input type="text" placeholder="Jean" [(ngModel)]="form.firstName" name="firstName" required />
        </div>
        <div class="form-group">
          <label>Nom *</label>
          <input type="text" placeholder="Dupont" [(ngModel)]="form.lastName" name="lastName" required />
        </div>
      </div>

      @if (form.role === 'Recruiter') {
        <div class="form-group">
          <label>Entreprise</label>
          <div class="input-icon">
            <i class="bi bi-building"></i>
            <input type="text" placeholder="Nom de votre entreprise" [(ngModel)]="form.company" name="company" />
          </div>
        </div>
      }

      <div class="form-group">
        <label>Adresse email *</label>
        <div class="input-icon">
          <i class="bi bi-envelope"></i>
          <input type="email" placeholder="vous&#64;exemple.fr" [(ngModel)]="form.email" name="email" required />
        </div>
      </div>

      <div class="form-group">
        <label>Mot de passe * <span style="color:var(--text-muted);font-weight:400">(6 car. min)</span></label>
        <div class="input-icon">
          <i class="bi bi-lock"></i>
          <input [type]="showPassword ? 'text' : 'password'" placeholder="Choisissez un mot de passe" [(ngModel)]="form.password" name="password" required />
          <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
            <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary full-w" [disabled]="loading">
        @if (loading) { <span class="sp"></span> Creation... } @else { <i class="bi bi-check-lg"></i> Creer mon compte }
      </button>
    </form>

    <div class="auth-footer">
      <span>Deja un compte ?</span>
      <a routerLink="/login">Se connecter</a>
    </div>
  </div>
</section>
