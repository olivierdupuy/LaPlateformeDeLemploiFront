<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>La Plateforme de l'Emploi — Trouvez votre prochain emploi en France</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SEO de base -->
  <meta name="description" content="La Plateforme de l'Emploi : trouvez votre prochain emploi parmi des milliers d'offres CDI, CDD, stage, alternance et freelance en France. Postulez en ligne facilement.">
  <meta name="keywords" content="emploi, offre emploi, recrutement, CDI, CDD, stage, alternance, freelance, travail, carriere, France, job board">
  <meta name="author" content="La Plateforme de l'Emploi SAS">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.plateforme-emploi.fr/">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="La Plateforme de l'Emploi">
  <meta property="og:title" content="La Plateforme de l'Emploi — Trouvez votre prochain emploi">
  <meta property="og:description" content="Des milliers d'offres d'emploi en France. CDI, CDD, stage, alternance, freelance. Postulez en quelques clics.">
  <meta property="og:url" content="https://www.plateforme-emploi.fr/">
  <meta property="og:locale" content="fr_FR">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="La Plateforme de l'Emploi">
  <meta name="twitter:description" content="Des milliers d'offres d'emploi en France. Postulez en quelques clics.">

  <!-- Couleur du theme -->
  <meta name="theme-color" content="#065f46">
  <meta name="msapplication-TileColor" content="#065f46">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="favicon.ico">

  <!-- Preconnect pour la performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Structured Data : Organisation -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "La Plateforme de l'Emploi",
    "url": "https://www.plateforme-emploi.fr",
    "description": "Plateforme de mise en relation entre candidats et entreprises en France.",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "42 rue de l'Innovation",
      "addressLocality": "Paris",
      "postalCode": "75001",
      "addressCountry": "FR"
    },
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+33-1-23-45-67-89",
      "contactType": "customer service",
      "availableLanguage": "French"
    }
  }
  </script>

  <!-- Structured Data : WebSite (search) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "La Plateforme de l'Emploi",
    "url": "https://www.plateforme-emploi.fr",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://www.plateforme-emploi.fr/offres?search={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
